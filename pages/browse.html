<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav>
    <div class="logo">Campus Lost & Found</div>

    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="report-lost.html">Lost</a></li>
        <li><a href="report-found.html">Found</a></li>
    </ul>
</nav>

<section class="browse">

    <h1>Browse Items</h1>

    <input
        type="text"
        id="search"
        placeholder="Search items..."
    >
    <div class="filters">

    <button onclick="filterItems('all')">All</button>

    <button onclick="filterItems('lost')">Lost</button>

    <button onclick="filterItems('found')">Found</button>

</div>

   <div id="items">
    

    <div class="item lost">
        <h3>Black Backpack</h3>
        <p>Library</p>
        <span>Lost</span>
    </div>

    <div class="item found">
        <h3>College ID Card</h3>
        <p>Cafeteria</p>
        <span>Found</span>
    </div>

    <div class="item lost">
        <h3>Calculator</h3>
        <p>Lab 3</p>
        <span>Lost</span>
    </div>

    <div class="item found">
        <h3>Wallet</h3>
        <p>Parking Area</p>
        <span>Found</span>
    </div>

    <div class="item lost">
        <h3>Water Bottle</h3>
        <p>Ground</p>
        <span>Lost</span>
    </div>

    <div class="item found">
        <h3>Earbuds</h3>
        <p>Block A</p>
        <span>Found</span>
    </div>

</div>
<p id="message" style="display:none;">
    No items found.
</p>

</section>

<script src="../script.js"></script>

</body>
</html>
