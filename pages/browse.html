<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Items – Campus Lost & Found</title>
    <meta name="description" content="Browse all reported lost and found items on campus.">
    <link rel="stylesheet" href="../style.css">
</head>
<body>

<nav>
    <div class="logo">Campus Lost &amp; Found</div>
    <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="report-lost.html">Lost</a></li>
        <li><a href="report-found.html">Found</a></li>
    </ul>
</nav>

<section class="browse">

    <h1>Browse Items</h1>

    <input
        type="text"
        id="search"
        placeholder="Search items..."
    >

    <div class="filters">
        <button id="btn-all"   class="active" onclick="filterItems('all')">All</button>
        <button id="btn-lost"             onclick="filterItems('lost')">Lost</button>
        <button id="btn-found"            onclick="filterItems('found')">Found</button>
    </div>

    <div id="items"></div>

    <p id="message" style="display:none;color:#aaa;text-align:center;padding:20px;">
        No items found.
    </p>

</section>

<script type="module" src="../script.js"></script>

</body>
</html>
